<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>youranicehouseplant</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="alternate icon" href="images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #18242b;
      --peach: #ffc48b;
      --mint: #8fe4ce;
      --tomato: #f36d4d;
      --paper: rgba(255, 252, 246, 0.84);
      --line: rgba(24, 36, 43, 0.16);
      --shadow: 0 18px 44px rgba(24, 36, 43, 0.16);
      --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
      --fast: 180ms;
      --base: 280ms;
      --slow: 700ms;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Sora", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(54rem 26rem at -8% -8%, rgba(243, 109, 77, 0.26), transparent 62%),
        radial-gradient(50rem 24rem at 104% 2%, rgba(143, 228, 206, 0.34), transparent 62%),
        linear-gradient(160deg, #fff8ee 0%, #ffe8d4 44%, #ffe3cf 100%);
      background-size: 180% 180%, 190% 190%, 140% 140%;
      background-position: 0% 0%, 100% 0%, 50% 50%;
      display: grid;
      place-items: center;
      padding: 1rem;
      overflow: hidden;
      line-height: 1.5;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      animation: backgroundFlow 7s linear infinite;
    }

    .bg-motion {
      position: fixed;
      inset: -18%;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(34rem 26rem at 20% 30%, rgba(243, 109, 77, 0.34), transparent 68%),
        radial-gradient(38rem 28rem at 74% 24%, rgba(143, 228, 206, 0.38), transparent 70%),
        radial-gradient(30rem 20rem at 58% 78%, rgba(255, 196, 139, 0.3), transparent 72%);
      filter: blur(16px);
      transform-origin: center;
        animation: ambientDrift 7s cubic-bezier(0.22, 1, 0.36, 1) infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      z-index: -1;
      filter: blur(14px);
      animation: drift 12s var(--ease-smooth) infinite;
    }

    body::before {
      width: 16rem;
      height: 16rem;
      left: -4rem;
      bottom: -4rem;
      background: rgba(243, 109, 77, 0.23);
    }

    body::after {
      width: 13rem;
      height: 13rem;
      right: 4%;
      top: 9%;
      background: rgba(143, 228, 206, 0.26);
      animation-delay: 1.2s;
    }

    .site-card {
      width: min(820px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 1.2rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(9px);
      padding: clamp(1rem, 2.7vw, 2rem);
      animation: rise var(--slow) var(--ease-smooth) both;
      transition: transform var(--base) var(--ease-smooth), box-shadow var(--base) var(--ease-smooth), border-color var(--base) ease;
      position: relative;
      z-index: 1;
    }

    .site-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 48px rgba(24, 36, 43, 0.18);
      border-color: rgba(24, 36, 43, 0.22);
    }

    .pill {
      display: inline-block;
      font-family: "IBM Plex Mono", monospace;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      border-radius: 999px;
      padding: 0.35rem 0.72rem;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.85rem;
      animation: rise 620ms var(--ease-smooth) 40ms both;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 0.7rem;
      max-width: 14ch;
      animation: rise 620ms var(--ease-smooth) 120ms both;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.9rem;
      align-items: start;
      margin-bottom: 0.5rem;
    }

    .hero-copy-wrap {
      min-width: 0;
    }

    .avatar {
      width: clamp(88px, 18vw, 120px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(24, 36, 43, 0.15);
      background: #fff;
      object-fit: cover;
      box-shadow: 0 10px 20px rgba(24, 36, 43, 0.12);
      animation: rise 620ms var(--ease-smooth) 220ms both, bob 5s ease-in-out 1.2s infinite;
      transition: transform var(--base) var(--ease-smooth), box-shadow var(--base) var(--ease-smooth);
    }

    .avatar:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 26px rgba(24, 36, 43, 0.16);
    }

    .accent {
      background: linear-gradient(90deg, var(--tomato), #f89560 52%, #e7ba68);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .intro {
      font-size: clamp(0.95rem, 2.2vw, 1.08rem);
      line-height: 1.66;
      margin-bottom: 1rem;
      max-width: 58ch;
      animation: rise 620ms var(--ease-smooth) 180ms both;
    }

    .about-line {
      margin-top: -0.4rem;
      margin-bottom: 1rem;
      font-size: 0.86rem;
      color: rgba(24, 36, 43, 0.74);
      font-family: "IBM Plex Mono", monospace;
      animation: rise 620ms var(--ease-smooth) 260ms both;
    }

    .message-text {
      margin-bottom: 1rem;
      font-size: 0.9rem;
      line-height: 1.62;
      color: rgba(24, 36, 43, 0.86);
      animation: rise 620ms var(--ease-smooth) 320ms both;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      animation: rise 620ms var(--ease-smooth) 380ms both;
    }

    .socials a {
      text-decoration: none;
      color: var(--ink);
      font-size: 0.82rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      padding: 0.36rem 0.74rem;
      transition: transform var(--fast) var(--ease-smooth), background var(--fast) ease, box-shadow var(--fast) ease, border-color var(--fast) ease;
    }

    .socials a:hover,
    .socials a:focus-visible {
      transform: translateY(-2px);
      background: #ffffff;
      border-color: rgba(24, 36, 43, 0.28);
      box-shadow: 0 8px 18px rgba(24, 36, 43, 0.1);
      outline: none;
    }

    .socials a:focus-visible {
      box-shadow: 0 0 0 3px rgba(143, 228, 206, 0.35), 0 8px 18px rgba(24, 36, 43, 0.1);
    }

    .dots {
      display: flex;
      gap: 0.44rem;
      margin-bottom: 0.65rem;
      animation: rise 620ms var(--ease-smooth) 440ms both;
    }

    .dot {
      width: 0.62rem;
      height: 0.62rem;
      border-radius: 50%;
      background: var(--tomato);
      animation: pulse 2.2s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      background: var(--peach);
      animation-delay: 0.22s;
    }

    .dot:nth-child(3) {
      background: var(--mint);
      animation-delay: 0.44s;
    }

    .copyright {
      border-top: 1px solid rgba(24, 36, 43, 0.12);
      padding-top: 0.7rem;
      font-size: 0.76rem;
      color: rgba(24, 36, 43, 0.68);
      font-family: "IBM Plex Mono", monospace;
      animation: rise 620ms var(--ease-smooth) 500ms both;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        transform: translateY(0) scale(1);
        opacity: 0.72;
      }
      50% {
        transform: translateY(-3px) scale(1.12);
        opacity: 1;
      }
    }

    @keyframes drift {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-14px);
      }
    }

    @keyframes backgroundFlow {
      0% {
        background-position: 0% 0%, 100% 0%, 50% 50%;
      }
      50% {
        background-position: 16% 12%, 84% 18%, 44% 40%;
      }
      100% {
        background-position: 30% 24%, 70% 30%, 58% 62%;
      }
    }

    @keyframes bob {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-3px);
      }
    }

    @keyframes ambientDrift {
      0% {
          transform: translate3d(-8%, -6%, 0) scale(1) rotate(0deg);
      }
      50% {
          transform: translate3d(7%, 6%, 0) scale(1.16) rotate(3deg);
      }
      100% {
          transform: translate3d(12%, 9%, 0) scale(1.24) rotate(6deg);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 0.75rem;
      }

      .site-card {
        border-radius: 1rem;
        padding: 0.86rem;
      }

      h1 {
        max-width: 100%;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .avatar {
        width: 86px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-motion" aria-hidden="true"></div>
  <main class="site-card" role="main" aria-label="Welcome page">
    <section class="hero" aria-label="Intro">
      <div class="hero-copy-wrap">
        <span class="pill">youranicehouseplant</span>
        <h1><span class="accent">my website</span></h1>
        <p class="intro">I kinda do not know what to add in it yet, but thanks for stopping by.</p>
        <p class="about-line">about me: i like games, coding and sports.</p>
      </div>
      <img class="avatar" src="images/pfp.jpg" alt="Profile image">
    </section>

    <p class="message-text">Suggestions would be much appreciated.</p>

    <div class="socials" aria-label="Social links">
      <a href="https://www.instagram.com/epivzz/" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="https://www.youtube.com/@epivz" target="_blank" rel="noopener noreferrer">YouTube</a>
      <a href="https://www.tiktok.com/@epivz" target="_blank" rel="noopener noreferrer">TikTok</a>
      <a href="https://www.twitch.tv/epivzzz" target="_blank" rel="noopener noreferrer">Twitch</a>
      <a href="https://x.com/epivzzz" target="_blank" rel="noopener noreferrer">X</a>
    </div>

    <div class="dots" aria-hidden="true">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <p class="copyright">&copy; 2026 youareanicehouseplant. All rights reserved.</p>
  </main>

</body>
</html>
