<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="alternate icon" href="images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #142028;
      --gold: #ffc65c;
      --coral: #ff7a59;
      --aqua: #5ed0c5;
      --mist: rgba(255, 255, 255, 0.76);
      --line: rgba(20, 32, 40, 0.15);
      --shadow: 0 16px 40px rgba(20, 32, 40, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(48rem 20rem at 0% 0%, rgba(255, 198, 92, 0.3), transparent 65%),
        radial-gradient(40rem 24rem at 100% 8%, rgba(94, 208, 197, 0.34), transparent 62%),
        linear-gradient(150deg, #fff9ef 0%, #ffe7d2 52%, #ffe2c7 100%);
      display: grid;
      place-items: center;
      padding: 1rem;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(10px);
      z-index: -1;
      animation: bob 9s ease-in-out infinite;
    }

    body::before {
      width: 16rem;
      height: 16rem;
      left: -4rem;
      bottom: -4rem;
      background: rgba(255, 122, 89, 0.3);
    }

    body::after {
      width: 12rem;
      height: 12rem;
      right: 4%;
      top: 10%;
      background: rgba(94, 208, 197, 0.28);
      animation-delay: 1.2s;
    }

    .coming-soon {
      width: min(820px, 100%);
      background: var(--mist);
      border: 1px solid var(--line);
      border-radius: 1.25rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
      padding: clamp(1rem, 2.5vw, 2rem);
      text-align: center;
      animation: rise 0.8s ease both;
    }

    .pill {
      display: inline-block;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: clamp(2rem, 9vw, 4.9rem);
      line-height: 0.9;
      margin-bottom: 0.9rem;
      letter-spacing: -0.02em;
    }

    .accent {
      background: linear-gradient(90deg, var(--coral), #ff9664 48%, #f5b74d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      font-size: clamp(0.95rem, 2.4vw, 1.15rem);
      line-height: 1.55;
      max-width: 56ch;
      margin: 0 auto;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 0.45rem;
      margin-top: 1.25rem;
    }

    .dot {
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 50%;
      background: var(--coral);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.25s;
      background: var(--gold);
    }

    .dot:nth-child(3) {
      animation-delay: 0.5s;
      background: var(--aqua);
    }

    .note {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: rgba(20, 32, 40, 0.7);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        transform: translateY(0) scale(1);
        opacity: 0.7;
      }
      50% {
        transform: translateY(-3px) scale(1.15);
        opacity: 1;
      }
    }

    @keyframes bob {
      0%,
      100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @media (max-width: 520px) {
      .coming-soon {
        border-radius: 1rem;
      }

      .pill {
        margin-bottom: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <main class="coming-soon" role="main" aria-label="Coming soon message">
    <span class="pill">Update in progress</span>
    <h1><span class="accent">Coming Soon</span></h1>
    <p>
      A brand new website is on the way. I am rebuilding this space from the ground up and will be back online soon.
    </p>
    <div class="dots" aria-hidden="true">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p class="note">Thanks for your patience.</p>
  </main>
</body>
</html>
